<!DOCTYPE html>
<html>
  <head>
    <title>Form Autofill</title>
    <link rel="stylesheet" href="popup.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <!-- 
    Either start in 'dark-theme' or 'light-theme'. 
    We'll set 'light-theme' as default, and we'll let JS toggle in or out of dark mode.
  -->
  <body class="light-theme">
    <div class="container">
      <header>
        <h2>ONB HELPER</h2>
        <div class="region-selector">
          <button id="region-btn" class="region-btn" title="Select Region">
            <i class="fas fa-globe"></i>
            <span id="current-region">AU</span>
          </button>
          <div
            id="region-dropdown"
            class="region-dropdown"
            style="display: none"
          >
            <button class="region-option" data-region="AU">AU</button>
            <button class="region-option" data-region="UK">UK</button>
          </div>
        </div>
      </header>

      <section id="url-matching" class="card">
        <div class="card-header">
          <h2><i class="fas fa-link"></i> Matched URL Config</h2>
        </div>
        <div class="form-group">
          <p id="status">Loading...</p>
          <div class="buttons-group">
            <div id="buttons"></div>
          </div>
        </div>
      </section>

      <section id="generate-email" class="card">
        <div class="card-header">
          <h2><i class="fas fa-envelope"></i> Email Prefill</h2>
          <button
            id="clear-history-btn"
            class="icon-button"
            title="Clear email history"
            aria-label="Clear email history"
          >
            <i class="fas fa-trash-alt"></i>
          </button>
        </div>
        <div class="form-group">
          <label for="email-prefix">Your Name:</label>
          <input type="text" id="email-prefix" placeholder="e.g. John Doe" />
        </div>
        <div class="form-group">
          <label for="ticket-number">Ticket Number:</label>
          <input type="text" id="ticket-number" placeholder="e.g. BANK-1234" />
        </div>
        <div class="form-group">
          <label for="phone-number">Phone Number:</label>
          <input type="tel" id="phone-number" placeholder="e.g. 04XXXXXXXX" />
        </div>
        <div class="form-group">
          <p id="last-email-display">No email generated yet</p>
        </div>
        <div
          style="
            display: flex;
            gap: 8px;
            margin: 0.75rem 1rem;
            width: calc(100% - 2rem);
          "
        >
          <button
            id="generate-email-btn"
            class="btn-outline"
            class="btn-primary"
            style="
              flex: 1 1 0;
              margin: 0;
              justify-content: center;
              min-width: 0;
            "
          >
            SignUp
          </button>
          <button
            id="log-back-in-btn"
            class="btn-primary"
            style="
              flex: 1 1 0;
              margin: 0;
              justify-content: center;
              min-width: 0;
            "
          >
            Log back in
          </button>
        </div>
        <p id="email-status"></p>
      </section>
    </div>

    <script type="module" src="src/popup/index.js"></script>
  </body>
</html>
